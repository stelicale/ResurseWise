server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React Router – any unknown route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api → Spring Boot (replace REACT_APP_API_URL=localhost:8080 from decvelopment setupProxy.js)
    location /api/ {
        proxy_pass       http://backend:8080/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /keycloak → Keycloak (replace setupProxy.js proxy to localhost:8080 with REACT_APP_KEYCLOAK_PROXY_PREFIX=/keycloak)
    location /keycloak/ {
        proxy_pass       http://keycloak:8080/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
