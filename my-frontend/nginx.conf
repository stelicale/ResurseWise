server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;

    # React Router – any unknown route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Runtime config for the SPA
    location = /env.js {
        default_type application/javascript;
        add_header Cache-Control "no-store";
        try_files /env.js =404;
    }

    # Cache immutable frontend bundles aggressively.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Always revalidate index.html to pick up fresh deployments.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # /api → Spring Boot (replace REACT_APP_API_URL=localhost:8080 from decvelopment setupProxy.js)
    location /api/ {
        proxy_pass       http://backend:8080;
        proxy_set_header Host              $host;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /keycloak → Keycloak (replace setupProxy.js proxy to localhost:8080 with REACT_APP_KEYCLOAK_PROXY_PREFIX=/keycloak)
    location /keycloak/ {
        set $keycloak_upstream keycloak:8080;
        rewrite ^/keycloak/(.*)$ /$1 break;
        proxy_pass       http://$keycloak_upstream;
        proxy_set_header Host              localhost:8081;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
