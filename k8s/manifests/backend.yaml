apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: dvloper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: dvloper-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              value: jdbc:postgresql://postgres:5432/mydb
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: dvloper-secrets
                  key: APP_DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dvloper-secrets
                  key: APP_DB_PASSWORD
            - name: JWT_ISSUER_URI
              value: http://keycloak.local/realms/ITResurceManager
            - name: JWT_JWK_SET_URI
              value: http://keycloak-keycloakx-http.keycloak.svc.cluster.local/realms/ITResurceManager/protocol/openid-connect/certs
            - name: KEYCLOAK_ADMIN_URL
              value: http://keycloak-keycloakx-http.keycloak.svc.cluster.local
            - name: KEYCLOAK_REALM
              valueFrom:
                secretKeyRef:
                  name: dvloper-secrets
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: dvloper-secrets
                  key: KEYCLOAK_ADMIN_USERNAME
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dvloper-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: SERVER_PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: dvloper
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
