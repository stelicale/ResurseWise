apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup-daily
  namespace: dvloper
spec:
  # Run backup every day at 2 AM
  schedule: "0 2 * * *"
  
  # Keep 3 successful and 1 failed job for logs
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  
  # Cancel job if it takes more than 1 hour
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: postgres-backup
        spec:
          serviceAccountName: postgres-backup
          restartPolicy: OnFailure
          containers:
            - name: postgres-backup
              image: postgres:16
              imagePullPolicy: IfNotPresent
              command: ["/bin/bash", "/scripts/backup.sh"]
              env:
                - name: PGHOST
                  value: "postgres"
                - name: PGPORT
                  value: "5432"
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: dvloper-secrets
                      key: APP_DB_USER
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: dvloper-secrets
                      key: APP_DB_PASSWORD
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: dvloper-secrets
                      key: APP_DB_NAME
              volumeMounts:
                - name: backup-script
                  mountPath: /scripts
                  readOnly: true
                - name: backup-storage
                  mountPath: /backups
          volumes:
            - name: backup-script
              configMap:
                name: postgres-backup-script
                defaultMode: 0755
            - name: backup-storage
              persistentVolumeClaim:
                claimName: postgres-backup-storage
