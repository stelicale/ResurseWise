apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-restore-script
  namespace: dvloper
data:
  restore.sh: |
    #!/bin/bash
    set -e
    
    BACKUP_DIR="/backups"
    BACKUP_FILE=${1:-}
    
    # Get database credentials from environment
    PGHOST=${PGHOST:-postgres}
    PGPORT=${PGPORT:-5432}
    PGUSER=${PGUSER:-postgres}
    PGPASSWORD=${PGPASSWORD}
    PGDATABASE=${PGDATABASE:-dvloper}
    
    # If no backup file specified, use the latest one
    if [ -z "$BACKUP_FILE" ]; then
        BACKUP_FILE=$(ls -t1 "$BACKUP_DIR"/postgres_backup_*.sql 2>/dev/null | head -1)
        if [ -z "$BACKUP_FILE" ]; then
            echo "Error: No backup files found in $BACKUP_DIR" >&2
            exit 1
        fi
        echo "Using latest backup: $(basename "$BACKUP_FILE")"
    fi
    
    # Verify backup file exists
    if [ ! -f "$BACKUP_FILE" ]; then
        echo "Error: Backup file not found: $BACKUP_FILE" >&2
        exit 1
    fi
    
    # Verify checksum if available
    if [ -f "${BACKUP_FILE}.sha256" ]; then
        echo "Verifying backup integrity..."
        cd "$(dirname "$BACKUP_FILE")"
        if sha256sum -c "$(basename "${BACKUP_FILE}.sha256")" > /dev/null 2>&1; then
            echo "Backup integrity verified ✓"
        else
            echo "Error: Backup integrity check failed!" >&2
            exit 1
        fi
    else
        echo "Warning: No checksum file found for verification"
    fi
    
    # Confirm before restoring
    echo ""
    echo "WARNING: This will overwrite the current database!"
    echo "Database: $PGDATABASE"
    echo "Backup file: $BACKUP_FILE"
    echo ""
    echo "Proceeding with restore in 10 seconds... (press Ctrl+C to cancel)"
    sleep 10
    
    # Export password for psql
    export PGPASSWORD
    
    # Drop existing connections
    echo "Terminating existing connections..."
    psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d postgres -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = '$PGDATABASE';"
    
    # Drop and recreate database
    echo "Dropping existing database..."
    psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d postgres -c "DROP DATABASE IF EXISTS $PGDATABASE;"
    
    echo "Creating new database..."
    psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d postgres -c "CREATE DATABASE $PGDATABASE OWNER $PGUSER;"
    
    # Restore from backup
    echo "Starting restore from backup at $(date)..."
    if psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" "$PGDATABASE" < "$BACKUP_FILE"; then
        echo "Restore completed successfully at $(date)"
        exit 0
    else
        echo "Restore failed!" >&2
        exit 1
    fi
