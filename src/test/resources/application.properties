# Test profile
spring.profiles.active=test

# Allow bean definition override for tests (TestSecurityConfig overrides SecurityConfig)
spring.main.allow-bean-definition-overriding=true

# Disable OAuth2 Resource Server Auto-Configuration for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

# Test configuration - uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

#H2 Console for debugging (optional)
spring.h2.console.enabled=false

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Disable Keycloak for tests (mock authentication)
spring.security.oauth2.resourceserver.jwt.issuer-uri=
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=
